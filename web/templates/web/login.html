<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AllofCanada</title>
    <!-- Bootstrap 5.3.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Base Layout */
        body {
            font-family: Arial, sans-serif;
            background-color: #fdfdfd;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Navigation */
        header {
            background-color: #fff;
            border-bottom: 1px solid #ccc;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            color: #0000ee;
        }
        nav a {
            margin-left: 15px;
            text-decoration: none;
            color: #0000ee;
        }
        nav a:hover {
            text-decoration: underline;
        }

        /* Centering Wrapper */
        .auth-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
        }

        /* Auth Card */
        .auth-container {
            background: #fff;
            border: 1px solid #ccc;
            padding: 30px;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            margin: auto; /* Vertically and horizontally centers the card */
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            border-bottom: 1px solid #bbb;
            padding-bottom: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #aaa;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background-color: #efefef;
            border: 1px solid #aaa;
            border-radius: 4px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #e0e0e0;
        }
        .footer-links {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
        }
        .footer-links a {
            color: #0000ee;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">AllofCanada</a>
        <nav>
            <a href="{% url "home" %}">Home</a>
            <a href="{% url "ads" %}">Ads</a>
            <a href="#">Contact</a>
            <a href="{% url "login" %}">Login</a>
            <a href="{% url "register" %}">Register</a>
        </nav>
    </header>

    <div class="auth-wrapper">
        <div class="auth-container">
            <h2>Log In</h2>
            <form action="#" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Email or Mobile Number</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="submit-btn">Log In</button>
            </form>

            <div class="footer-links">
                <a href="#">Forgot password?</a> | <a href="{% url "register" %}">Register here</a>
            </div>
        </div>
    </div>

</body>
</html>
