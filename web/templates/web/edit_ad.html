<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ad - AllofCanada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #fdfdfd; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #fff; border-bottom: 1px solid #ccc; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: bold; text-decoration: none; color: #0000ee; }
        nav a { margin-left: 15px; text-decoration: none; color: #0000ee; }
        .form-wrapper { max-width: 650px; width: 100%; margin: 30px auto; padding: 0 20px; }
        .form-container { background: #fff; border: 1px solid #ccc; padding: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #aaa; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; height: 120px; }
        .submit-btn { width: 100%; padding: 12px; font-size: 16px; background-color: #efefef; border: 1px solid #aaa; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .submit-btn:hover { background-color: #e0e0e0; }
    </style>
</head>
<body>

    <header>
    <a href="{% url 'index' %}" class="logo">AllofCanada</a>
    <nav>
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'ads' %}">Ads</a>
        <a href="#">Contact</a>

        {% if request.session.user_email %}
            <a href="{% url 'profile' %}">My Profile</a>
            
            {% if request.session.ad_count >= 3 %}
                <a href="#" 
                   onclick="alert('3 ads are allowed to be active at once. Please delete old ads to put on new ads.'); return false;" 
                   style="color: #999; cursor: not-allowed;" 
                   title="3 ads are allowed to be active at once. Please delete old ads to put on new ads.">
                   Post an Ad
                </a>
            {% else %}
                <a href="{% url 'post-ad' %}">Post an Ad</a>
            {% endif %}
            
            <a href="{% url 'logout' %}" style="color: #cc0000;">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
</header>

    <div class="form-wrapper">
        <div class="form-container">
            <h2>Edit Advertisement</h2>
            <form action="" method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>Ad Title / Name</label>
                    <input type="text" name="title" value="{{ ad.title }}" required>
                </div>

                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" name="price" value="{{ ad.price }}">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" required>{{ ad.description }}</textarea>
                </div>

                <div class="row">
                    <div class="form-group col-md-6">
                        <label>City / Region</label>
                        <input type="text" name="city" value="{{ ad.city }}" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Postal Code / Zip Code</label>
                        <input type="text" name="zip_code" value="{{ ad.zip_code }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Street Address (Optional)</label>
                    <input type="text" name="address" value="{{ ad.address }}">
                </div>

                <button type="submit" class="submit-btn">Save Attributes Update</button>
            </form>
        </div>
    </div>

</body>
</html>
